<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mermaid for Excel</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        font-size: 14px;
        background: #fff;
        color: #323130;
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
        padding: 12px;
        gap: 8px;
        overflow-y: auto;
      }

      h1 {
        font-size: 16px;
        font-weight: 600;
        color: #0078d4;
      }

      textarea {
        width: 100%;
        height: 180px;
        padding: 8px;
        border: 1px solid #c7c7c7;
        border-radius: 4px;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 12px;
        resize: vertical;
        flex-shrink: 0;
      }
      textarea:focus {
        outline: none;
        border-color: #0078d4;
      }

      .buttons {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      button {
        flex: 1;
        padding: 2px 4px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 8px;
        font-weight: 600;
        transition: background 0.1s;
      }
      #render-btn {
        background: #0078d4;
        color: #fff;
      }
      #render-btn:hover {
        background: #005a9e;
      }
      #insert-btn {
        background: #107c10;
        color: #fff;
      }
      #insert-btn:hover {
        background: #0b5e0b;
      }
      #insert-btn:disabled {
        background: #a8a8a8;
        cursor: not-allowed;
      }
      #download-btn {
        background: #5c2d91;
        color: #fff;
      }
      #download-btn:hover {
        background: #451f6e;
      }
      #download-btn:disabled {
        background: #a8a8a8;
        cursor: not-allowed;
      }

      #format-select {
        padding: 4px 6px;
        border: 1px solid #c7c7c7;
        border-radius: 4px 0 0 4px;
        background: #f3f2f1;
        color: #323130;
        font-size: 8px;
        font-weight: 600;
        cursor: pointer;
        flex-shrink: 0;
        height: 100%;
      }
      #format-select:focus {
        outline: none;
        border-color: #0078d4;
      }
      .insert-group {
        display: flex;
        flex: 1;
      }
      .insert-group #format-select {
        border-right: none;
      }
      .insert-group #insert-btn {
        border-radius: 0 4px 4px 0;
      }

      #error {
        color: #a4262c;
        font-size: 12px;
        min-height: 1.2em;
        flex-shrink: 0;
      }

      #preview {
        min-height: 500px;
        overflow: auto;
        border: 1px solid #e1e1e1;
        border-radius: 4px;
        padding: 8px;
        background: #faf9f8;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #preview svg {
        max-width: 100%;
        height: auto;
      }
      #preview .hint {
        color: #8a8886;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Mermaid for Excel</h1>

    <textarea id="mermaid-input" spellcheck="false">
graph TD
    A[開始] --> B{条件分岐}
    B -->|Yes| C[処理A]
    B -->|No| D[処理B]
    C --> E[終了]
    D --> E</textarea
    >

    <div class="buttons">
      <button id="render-btn">▶レンダリング</button>
      <div class="insert-group">
        <select id="format-select">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
        </select>
        <button id="insert-btn" disabled>Excel に挿入</button>
      </div>
      <button id="download-btn" disabled>⬇ダウンロード</button>
    </div>

    <div id="error"></div>

    <div id="preview">
      <span class="hint">← レンダリングボタンを押してください</span>
    </div>

    <script src="taskpane.js"></script>
  </body>
</html>
